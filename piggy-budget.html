<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FF8FA3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Piggy Bank — My Money</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF6E9;
    --card:#FFFFFF;
    --pig-pink:#FF8FA3;
    --pig-pink-light:#FFE1E8;
    --mint:#2FBF8F;
    --mint-bg:#E3FBF2;
    --coral:#FF6B5B;
    --coral-bg:#FFEAE7;
    --sun:#FFC145;
    --ink:#2B2A4C;
    --ink-soft:#726F94;
    --line:#F0E6D8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:28px;
  }

  /* ---- Tablet & up: float the app as a card on a soft backdrop ---- */
  @media (min-width:700px){
    body{
      background:linear-gradient(160deg,#FFF6E9 0%,#FDEFE0 100%);
      padding:32px 16px;
      align-items:flex-start;
    }
    .app{
      max-width:640px;
      min-height:auto;
      border-radius:32px;
      box-shadow:0 24px 60px rgba(43,42,76,0.14);
      overflow:hidden;
      padding-bottom:32px;
    }
  }

  /* ---- Laptop / desktop: two-column layout so history isn't a long empty column ---- */
  @media (min-width:1024px){
    .app{
      max-width:960px;
      display:grid;
      grid-template-columns:360px 1fr;
      grid-template-areas:
        "header header"
        "hero   history"
        "actions history";
      align-content:start;
      column-gap:8px;
    }
    header{ grid-area:header; }
    .hero{ grid-area:hero; }
    .actions{ grid-area:actions; margin-top:14px; }
    .history{ grid-area:history; margin-top:12px; margin-left:8px; max-height:640px; overflow-y:auto; padding-right:6px; }
  }

  /* ---- Header ---- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 20px 4px;
  }
  header h1{
    font-family:'Baloo 2',sans-serif;
    font-size:22px;
    font-weight:700;
    margin:0;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .gear-btn{
    width:40px;height:40px;
    border-radius:50%;
    border:none;
    background:var(--card);
    box-shadow:0 2px 0 var(--line);
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .gear-btn:active{transform:translateY(1px); box-shadow:none;}

  /* ---- Hero jar card ---- */
  .hero{
    margin:12px 18px 0;
    background:var(--card);
    border-radius:28px;
    padding:20px 20px 22px;
    box-shadow:0 4px 0 var(--line);
    text-align:center;
  }
  .piggy-wrap{
    width:150px;height:150px;
    margin:0 auto 4px;
    position:relative;
  }
  .piggy-wrap.bounce{ animation: bounce 0.55s ease; }
  .piggy-wrap.wobble{ animation: wobble 0.55s ease; }
  @keyframes bounce{
    0%{transform:translateY(0) scale(1);}
    30%{transform:translateY(-14px) scale(1.05);}
    55%{transform:translateY(0) scale(0.98);}
    100%{transform:translateY(0) scale(1);}
  }
  @keyframes wobble{
    0%{transform:rotate(0);}
    25%{transform:rotate(-6deg);}
    50%{transform:rotate(5deg);}
    75%{transform:rotate(-3deg);}
    100%{transform:rotate(0);}
  }
  .balance-label{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin:2px 0 0;
  }
  .balance-amount{
    font-family:'Baloo 2',sans-serif;
    font-size:38px;
    font-weight:800;
    margin:2px 0 0;
    line-height:1;
  }
  .goal-row{
    margin-top:12px;
  }
  .goal-text{
    font-size:13.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .goal-text button{
    border:none;background:none;color:var(--pig-pink);
    font-weight:800;font-size:13.5px;text-decoration:underline;
    padding:0; cursor:pointer;
  }
  .eta-text{
    font-size:13px;
    font-weight:800;
    color:var(--mint);
    background:var(--mint-bg);
    display:inline-block;
    padding:5px 12px;
    border-radius:99px;
    margin:8px 0 2px;
  }
  .progress-track{
    height:14px;
    background:var(--pig-pink-light);
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--pig-pink), var(--sun));
    border-radius:99px;
    transition:width 0.5s ease;
  }

  /* ---- Action buttons ---- */
  .actions{
    display:flex;
    gap:12px;
    margin:16px 18px 4px;
  }
  .action-btn{
    flex:1;
    border:none;
    border-radius:20px;
    padding:16px 8px;
    font-family:'Baloo 2',sans-serif;
    font-size:17px;
    font-weight:700;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
    color:#fff;
  }
  .action-btn.add{ background:var(--mint); box-shadow:0 4px 0 #1f9c72; }
  .action-btn.spend{ background:var(--coral); box-shadow:0 4px 0 #d94b3d; }
  .action-btn:active{ transform:translateY(3px); box-shadow:none; }
  .action-btn .emoji{ font-size:24px; }

  /* ---- History ---- */
  .history{
    margin:22px 18px 0;
    flex:1;
  }
  .history h2{
    font-family:'Baloo 2',sans-serif;
    font-size:17px;
    margin:0 0 10px 2px;
  }
  .date-group{ margin-bottom:14px; }
  .date-label{
    font-size:12px;
    font-weight:800;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin:0 0 8px 2px;
  }
  .tx-item{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card);
    border-radius:16px;
    padding:12px 14px;
    margin-bottom:8px;
    box-shadow:0 2px 0 var(--line);
  }
  .tx-emoji{
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .tx-item.in .tx-emoji{ background:var(--mint-bg); }
  .tx-item.out .tx-emoji{ background:var(--coral-bg); }
  .tx-main{ flex:1; min-width:0; }
  .tx-cat{ font-weight:800; font-size:14.5px; }
  .tx-note{ font-size:12px; color:var(--ink-soft); }
  .tx-amt{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15.5px; white-space:nowrap; }
  .tx-item.in .tx-amt{ color:var(--mint); }
  .tx-item.out .tx-amt{ color:var(--coral); }
  .tx-del{
    background:none;border:none;color:#D7D2E8;font-size:16px;
    padding:4px; cursor:pointer;
  }
  .empty-state{
    text-align:center;
    padding:30px 20px;
    color:var(--ink-soft);
  }
  .empty-state .big{ font-size:36px; display:block; margin-bottom:8px; }

  /* ---- Bottom sheet ---- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(43,42,76,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.open{ display:flex; }
  .sheet{
    width:100%;
    max-width:430px;
    background:var(--bg);
    border-radius:28px 28px 0 0;
    padding:18px 18px 26px;
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp 0.25s ease;
  }
  @keyframes slideUp{
    from{ transform:translateY(30px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .sheet-handle{
    width:40px;height:5px;background:var(--line);
    border-radius:99px;margin:0 auto 14px;
  }
  .sheet h3{
    font-family:'Baloo 2',sans-serif;
    font-size:19px;
    margin:0 0 14px;
    text-align:center;
  }
  .cat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:16px;
  }
  .cat-btn{
    background:var(--card);
    border:3px solid transparent;
    border-radius:16px;
    padding:12px 4px;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:12px;
    cursor:pointer;
    color:var(--ink);
  }
  .cat-btn .emoji{ font-size:22px; }
  .cat-btn.selected{ border-color:var(--sel-color, var(--pig-pink)); background:var(--sel-bg,var(--pig-pink-light)); }

  .when-row{ margin-bottom:16px; }
  .when-chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    border:2px solid var(--line);
    background:var(--card);
    border-radius:99px;
    padding:9px 14px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .chip.selected{
    border-color:var(--sel-color, var(--pig-pink));
    color:var(--ink);
    background:var(--sel-bg,var(--pig-pink-light));
  }
  .amount-display{
    text-align:center;
    font-family:'Baloo 2',sans-serif;
    font-size:34px;
    font-weight:800;
    margin:6px 0 14px;
    min-height:44px;
  }
  .keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:16px;
  }
  .key-btn{
    background:var(--card);
    border:none;
    border-radius:16px;
    padding:16px 0;
    font-family:'Baloo 2',sans-serif;
    font-size:20px;
    font-weight:700;
    box-shadow:0 2px 0 var(--line);
    cursor:pointer;
  }
  .key-btn:active{ transform:translateY(2px); box-shadow:none; }

  .confirm-btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:16px;
    font-family:'Baloo 2',sans-serif;
    font-size:17px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
  }
  .confirm-btn:disabled{ opacity:0.45; }
  .confirm-btn.add{ background:var(--mint); }
  .confirm-btn.spend{ background:var(--coral); }

  .close-sheet{
    position:absolute; top:16px; right:16px;
    background:var(--card); border:none; width:34px;height:34px;
    border-radius:50%; font-size:16px; cursor:pointer;
  }

  /* settings sheet fields */
  .field-label{ font-size:13px; font-weight:800; color:var(--ink-soft); margin:14px 2px 6px; }
  .text-input{
    width:100%; padding:14px; border-radius:14px; border:2px solid var(--line);
    font-family:'Nunito',sans-serif; font-size:16px; background:var(--card); color:var(--ink);
  }
  .danger-btn{
    width:100%; margin-top:18px; background:none; border:2px solid var(--coral);
    color:var(--coral); font-weight:800; border-radius:14px; padding:12px; cursor:pointer;
  }

  /* ---- Keyboard focus (desktop/keyboard users) ---- */
  button:focus-visible, input:focus-visible{
    outline:3px solid var(--sun);
    outline-offset:2px;
  }

  /* ---- Mouse hover (tablets w/ trackpad, laptops, desktops) ---- */
  @media (hover:hover) and (pointer:fine){
    .action-btn:hover{ filter:brightness(1.06); }
    .gear-btn:hover, .key-btn:hover, .close-sheet:hover{ background:#FAF6EE; }
    .cat-btn:hover{ background:var(--pig-pink-light); }
    .confirm-btn:not(:disabled):hover{ filter:brightness(1.06); }
    .tx-del:hover{ color:var(--coral); }
    .action-btn, .gear-btn, .key-btn, .cat-btn, .confirm-btn, .close-sheet, .tx-del{
      transition:filter 0.15s ease, background 0.15s ease;
    }
  }

  /* ---- Bottom sheet on phones -> centered dialog from tablet width up ---- */
  @media (min-width:700px){
    .overlay{ align-items:center; padding:20px; }
    .sheet{ border-radius:28px; max-width:440px; max-height:85vh; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>🐷 Piggy Bank</h1>
    <button class="gear-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
  </header>

  <div class="hero">
    <div class="piggy-wrap" id="piggyWrap">
      <svg viewBox="0 0 200 200" width="150" height="150">
        <defs>
          <clipPath id="pigClip">
            <ellipse cx="100" cy="115" rx="78" ry="58"/>
            <ellipse cx="45" cy="90" rx="18" ry="16"/>
            <ellipse cx="155" cy="90" rx="18" ry="16"/>
          </clipPath>
        </defs>
        <!-- empty body -->
        <g>
          <ellipse cx="100" cy="115" rx="78" ry="58" fill="#FFE1E8"/>
          <ellipse cx="45" cy="90" rx="18" ry="16" fill="#FFE1E8"/>
          <ellipse cx="155" cy="90" rx="18" ry="16" fill="#FFE1E8"/>
          <rect x="60" y="168" width="16" height="18" rx="6" fill="#FFE1E8"/>
          <rect x="124" y="168" width="16" height="18" rx="6" fill="#FFE1E8"/>
        </g>
        <!-- fill (clipped, height driven by JS) -->
        <g clip-path="url(#pigClip)">
          <rect id="fillRect" x="0" y="200" width="200" height="200" fill="#FF8FA3"/>
        </g>
        <!-- outline + face on top -->
        <g fill="none" stroke="#2B2A4C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="100" cy="115" rx="78" ry="58"/>
          <ellipse cx="45" cy="90" rx="18" ry="16"/>
          <ellipse cx="155" cy="90" rx="18" ry="16"/>
          <rect x="60" y="168" width="16" height="18" rx="6"/>
          <rect x="124" y="168" width="16" height="18" rx="6"/>
        </g>
        <ellipse cx="100" cy="118" rx="24" ry="16" fill="#FF6B5B" stroke="#2B2A4C" stroke-width="3.5"/>
        <circle cx="92" cy="118" r="3" fill="#2B2A4C"/>
        <circle cx="108" cy="118" r="3" fill="#2B2A4C"/>
        <circle cx="72" cy="100" r="4.5" fill="#2B2A4C"/>
        <circle cx="128" cy="100" r="4.5" fill="#2B2A4C"/>
        <rect x="92" y="78" width="16" height="6" rx="3" fill="#2B2A4C"/>
      </svg>
    </div>
    <p class="balance-label">You have</p>
    <p class="balance-amount" id="balanceAmount">KSh 0</p>

    <div class="goal-row" id="goalRow" style="display:none;">
      <p class="goal-text" id="goalText"></p>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="eta-text" id="etaText"></span>
    </div>
    <div class="goal-row" id="noGoalRow">
      <button onclick="openGoalSheet()" style="border:none;background:none;color:var(--pig-pink);font-weight:800;font-size:13.5px;text-decoration:underline;cursor:pointer;">🎯 Set a savings goal</button>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn add" onclick="openTxSheet('in')">
      <span class="emoji">➕</span> Add Money
    </button>
    <button class="action-btn spend" onclick="openTxSheet('out')">
      <span class="emoji">➖</span> Spend
    </button>
  </div>

  <div class="history">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>

</div>

<!-- Transaction sheet -->
<div class="overlay" id="txOverlay">
  <div class="sheet">
    <button class="close-sheet" onclick="closeSheet('txOverlay')">✕</button>
    <div class="sheet-handle"></div>
    <h3 id="txTitle">Add Money</h3>
    <div class="cat-grid" id="catGrid"></div>

    <div class="when-row">
      <p class="field-label" style="margin:0 0 8px 2px;">🗓️ When?</p>
      <div class="when-chips" id="whenChips">
        <button type="button" class="chip" data-when="now">✨ Just now</button>
        <button type="button" class="chip" data-when="yesterday">⏪ Yesterday</button>
        <button type="button" class="chip" data-when="custom">📅 Pick a date</button>
      </div>
      <input type="datetime-local" id="customDateInput" class="text-input" style="display:none; margin-top:8px;">
    </div>

    <div class="amount-display" id="amountDisplay">KSh 0</div>
    <div class="keypad" id="keypad"></div>
    <button class="confirm-btn add" id="confirmBtn" disabled onclick="confirmTx()">Add KSh 0</button>
  </div>
</div>

<!-- Goal sheet -->
<div class="overlay" id="goalOverlay">
  <div class="sheet">
    <button class="close-sheet" onclick="closeSheet('goalOverlay')">✕</button>
    <div class="sheet-handle"></div>
    <h3>🎯 What are you saving for?</h3>
    <p class="field-label">Goal name</p>
    <input class="text-input" id="goalNameInput" placeholder="e.g. New bicycle" maxlength="30">
    <p class="field-label">Target amount (KSh)</p>
    <input class="text-input" id="goalAmountInput" type="number" inputmode="numeric" placeholder="e.g. 3000">
    <button class="confirm-btn add" style="margin-top:18px;" onclick="saveGoal()">Save Goal</button>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <button class="close-sheet" onclick="closeSheet('settingsOverlay')">✕</button>
    <div class="sheet-handle"></div>
    <h3>⚙️ Settings</h3>
    <p class="field-label">Your name</p>
    <input class="text-input" id="nameInput" placeholder="e.g. Amani" maxlength="20">
    <button class="confirm-btn add" style="margin-top:18px;" onclick="saveSettings()">Save</button>
    <button class="danger-btn" onclick="resetAll()">🗑️ Reset all data</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'piggyBudget.v1';
  const INCOME_CATS = [
    {emoji:'🎁', label:'Pocket money'},
    {emoji:'💰', label:'Gift'},
    {emoji:'🧹', label:'Chores'},
    {emoji:'⭐', label:'Bonus'},
    {emoji:'🏆', label:'Prize'},
    {emoji:'✨', label:'Other'},
  ];
  const EXPENSE_CATS = [
    {emoji:'🍬', label:'Treats'},
    {emoji:'🎮', label:'Games'},
    {emoji:'🚌', label:'Transport'},
    {emoji:'📚', label:'School'},
    {emoji:'🍕', label:'Food'},
    {emoji:'✨', label:'Other'},
  ];

  let state = {
    name:'',
    goal:null, // {name, amount}
    transactions:[] // {id, type:'in'|'out', amount, emoji, label, date}
  };

  let txMode = 'in';
  let selectedCat = null;
  let amountStr = '';
  let selectedWhen = 'now';

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ state = JSON.parse(raw); }
    }catch(e){ console.warn('Could not load saved data', e); }
  }
  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn('Could not save data', e); }
  }

  function fmt(n){
    return 'KSh ' + Math.round(n).toLocaleString('en-KE');
  }

  function getBalance(){
    return state.transactions.reduce((sum,t)=> sum + (t.type==='in' ? t.amount : -t.amount), 0);
  }

  // Estimate how long until the goal is reached, based on average saving pace so far.
  function calcETA(balance){
    if(!state.goal || state.goal.amount<=0) return null;
    const remaining = state.goal.amount - balance;
    if(remaining <= 0) return {done:true};
    if(state.transactions.length === 0) return {noData:true};
    const firstMs = Math.min(...state.transactions.map(t=> new Date(t.date).getTime()));
    const daysElapsed = Math.max(1, (Date.now() - firstMs) / 86400000);
    const avgPerDay = balance / daysElapsed;
    if(avgPerDay <= 0) return {noRate:true};
    const daysLeft = Math.ceil(remaining / avgPerDay);
    return {daysLeft};
  }

  function formatETA(eta){
    if(!eta) return '';
    if(eta.done) return '🎉 Goal reached — nice one!';
    if(eta.noData || eta.noRate) return '💡 Add a bit more to see your estimate';
    const d = eta.daysLeft;
    if(d <= 1) return '🚀 About 1 day to go at this pace!';
    if(d < 14) return `🚀 About ${d} days to go at this pace!`;
    if(d < 60) return `🚀 About ${Math.round(d/7)} weeks to go at this pace!`;
    return `🚀 About ${Math.round(d/30)} months to go at this pace!`;
  }

  function render(){
    const balance = getBalance();
    document.getElementById('balanceAmount').textContent = fmt(balance);

    // piggy fill: based on goal progress, else scale against a soft cap of 5000
    let pct;
    if(state.goal && state.goal.amount > 0){
      pct = Math.max(0, Math.min(1, balance / state.goal.amount));
    } else {
      pct = Math.max(0, Math.min(1, balance / 5000));
    }
    const fillRect = document.getElementById('fillRect');
    const bodyTop = 57, bodyBottom = 173; // approx visible band of the pig body
    const fillHeight = (bodyBottom - bodyTop) * pct;
    fillRect.setAttribute('y', bodyBottom - fillHeight);
    fillRect.setAttribute('height', fillHeight + 40);

    if(state.goal){
      document.getElementById('goalRow').style.display = 'block';
      document.getElementById('noGoalRow').style.display = 'none';
      document.getElementById('goalText').innerHTML =
        `Saving for <strong>${escapeHtml(state.goal.name)}</strong> — ${fmt(balance)} of ${fmt(state.goal.amount)} <button onclick="openGoalSheet()">edit</button>`;
      document.getElementById('progressFill').style.width = (pct*100).toFixed(0)+'%';
      document.getElementById('etaText').innerHTML = formatETA(calcETA(balance));
    } else {
      document.getElementById('goalRow').style.display = 'none';
      document.getElementById('noGoalRow').style.display = 'block';
    }

    renderHistory();
  }

  function formatTxWhen(iso){
    const d = new Date(iso);
    const time = d.toLocaleTimeString('en-KE', {hour:'numeric', minute:'2-digit'});
    return `🕑 ${time}`;
  }

  function dateLabel(iso){
    const d = new Date(iso);
    const today = new Date();
    const yest = new Date(); yest.setDate(today.getDate()-1);
    const sameDay = (a,b)=> a.toDateString()===b.toDateString();
    if(sameDay(d,today)) return 'Today';
    if(sameDay(d,yest)) return 'Yesterday';
    return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  }

  function renderHistory(){
    const list = document.getElementById('historyList');
    if(state.transactions.length === 0){
      list.innerHTML = `<div class="empty-state"><span class="big">🐷</span>No money in or out yet.<br>Tap Add Money to start!</div>`;
      return;
    }
    const sorted = [...state.transactions].sort((a,b)=> new Date(b.date)-new Date(a.date));
    const groups = {};
    sorted.forEach(t=>{
      const label = dateLabel(t.date);
      if(!groups[label]) groups[label] = [];
      groups[label].push(t);
    });
    let html = '';
    Object.keys(groups).forEach(label=>{
      html += `<div class="date-group"><p class="date-label">${label}</p>`;
      groups[label].forEach(t=>{
        html += `
          <div class="tx-item ${t.type}">
            <div class="tx-emoji">${t.emoji}</div>
            <div class="tx-main">
              <div class="tx-cat">${escapeHtml(t.label)}</div>
              <div class="tx-note">${formatTxWhen(t.date)}</div>
            </div>
            <div class="tx-amt">${t.type==='in'?'+':'-'}${fmt(t.amount)}</div>
            <button class="tx-del" onclick="deleteTx('${t.id}')" aria-label="Delete">✕</button>
          </div>`;
      });
      html += `</div>`;
    });
    list.innerHTML = html;
  }

  function deleteTx(id){
    state.transactions = state.transactions.filter(t=>t.id!==id);
    saveState();
    render();
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---- Transaction sheet ----
  function openTxSheet(mode){
    txMode = mode;
    selectedCat = null;
    amountStr = '';
    selectedWhen = 'now';
    document.getElementById('txTitle').textContent = mode==='in' ? 'Add Money' : 'Spend Money';
    const cats = mode==='in' ? INCOME_CATS : EXPENSE_CATS;
    const grid = document.getElementById('catGrid');
    grid.innerHTML = cats.map((c,i)=>`
      <button class="cat-btn" data-idx="${i}" onclick="selectCat(${i})"
        style="--sel-color:${mode==='in' ? 'var(--mint)' : 'var(--coral)'}; --sel-bg:${mode==='in' ? 'var(--mint-bg)' : 'var(--coral-bg)'};">
        <span class="emoji">${c.emoji}</span>${c.label}
      </button>`).join('');

    const keypad = document.getElementById('keypad');
    const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','OK'];
    keypad.innerHTML = keys.map(k=>{
      if(k==='OK') return `<button class="key-btn" style="background:var(--sun);" onclick="closeKeypadFocus()">✓</button>`;
      return `<button class="key-btn" onclick="pressKey('${k}')">${k}</button>`;
    }).join('');

    // Reset the "when" chips: default to "Just now" and hide the custom date field
    document.querySelectorAll('#whenChips .chip').forEach(el=>{
      el.classList.toggle('selected', el.dataset.when === 'now');
      el.style.setProperty('--sel-color', mode==='in' ? 'var(--mint)' : 'var(--coral)');
      el.style.setProperty('--sel-bg', mode==='in' ? 'var(--mint-bg)' : 'var(--coral-bg)');
    });
    const customInput = document.getElementById('customDateInput');
    customInput.style.display = 'none';
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    customInput.value = now.toISOString().slice(0,16);

    updateAmountDisplay();
    updateConfirmBtn();
    document.getElementById('confirmBtn').className = 'confirm-btn ' + (mode==='in'?'add':'spend');
    openSheet('txOverlay');
  }

  document.getElementById('whenChips').addEventListener('click', (e)=>{
    const btn = e.target.closest('.chip');
    if(!btn) return;
    selectedWhen = btn.dataset.when;
    document.querySelectorAll('#whenChips .chip').forEach(el=> el.classList.toggle('selected', el===btn));
    document.getElementById('customDateInput').style.display = (selectedWhen==='custom') ? 'block' : 'none';
  });

  function computeTxDate(){
    if(selectedWhen === 'yesterday'){
      const d = new Date();
      d.setDate(d.getDate()-1);
      return d.toISOString();
    }
    if(selectedWhen === 'custom'){
      const val = document.getElementById('customDateInput').value;
      if(val){
        const d = new Date(val);
        if(!isNaN(d.getTime())) return d.toISOString();
      }
    }
    return new Date().toISOString();
  }

  function selectCat(idx){
    const cats = txMode==='in' ? INCOME_CATS : EXPENSE_CATS;
    selectedCat = cats[idx];
    document.querySelectorAll('.cat-btn').forEach((el,i)=>{
      el.classList.toggle('selected', i===idx);
    });
    updateConfirmBtn();
  }

  function pressKey(k){
    if(k==='⌫'){ amountStr = amountStr.slice(0,-1); }
    else {
      if(amountStr.length >= 6) return;
      amountStr += k;
    }
    updateAmountDisplay();
    updateConfirmBtn();
  }
  function closeKeypadFocus(){ /* purely visual OK key, no-op */ }

  function updateAmountDisplay(){
    const n = parseInt(amountStr||'0',10);
    document.getElementById('amountDisplay').textContent = fmt(n);
  }

  function updateConfirmBtn(){
    const n = parseInt(amountStr||'0',10);
    const btn = document.getElementById('confirmBtn');
    const ok = n>0 && selectedCat;
    btn.disabled = !ok;
    btn.textContent = (txMode==='in'?'Add ':'Spend ') + fmt(n);
  }

  function confirmTx(){
    const n = parseInt(amountStr||'0',10);
    if(!(n>0 && selectedCat)) return;
    state.transactions.push({
      id: 'tx_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      type: txMode,
      amount: n,
      emoji: selectedCat.emoji,
      label: selectedCat.label,
      date: computeTxDate()
    });
    saveState();
    render();
    closeSheet('txOverlay');
    const wrap = document.getElementById('piggyWrap');
    wrap.classList.remove('bounce','wobble');
    void wrap.offsetWidth;
    wrap.classList.add(txMode==='in' ? 'bounce' : 'wobble');
  }

  // ---- Goal sheet ----
  function openGoalSheet(){
    document.getElementById('goalNameInput').value = state.goal ? state.goal.name : '';
    document.getElementById('goalAmountInput').value = state.goal ? state.goal.amount : '';
    openSheet('goalOverlay');
  }
  function saveGoal(){
    const name = document.getElementById('goalNameInput').value.trim();
    const amount = parseInt(document.getElementById('goalAmountInput').value || '0', 10);
    if(name && amount>0){
      state.goal = {name, amount};
    } else {
      state.goal = null;
    }
    saveState();
    render();
    closeSheet('goalOverlay');
  }

  // ---- Settings sheet ----
  document.getElementById('settingsBtn').onclick = ()=>{
    document.getElementById('nameInput').value = state.name || '';
    openSheet('settingsOverlay');
  };
  function saveSettings(){
    state.name = document.getElementById('nameInput').value.trim();
    saveState();
    updateHeaderName();
    closeSheet('settingsOverlay');
  }
  function updateHeaderName(){
    document.querySelector('header h1').innerHTML = state.name
      ? `🐷 ${escapeHtml(state.name)}'s Piggy Bank`
      : `🐷 Piggy Bank`;
  }
  function resetAll(){
    if(confirm('This will delete all your saved money records. Are you sure?')){
      state = {name:state.name, goal:null, transactions:[]};
      saveState();
      render();
      closeSheet('settingsOverlay');
    }
  }

  // ---- Sheet helpers ----
  function openSheet(id){ document.getElementById(id).classList.add('open'); }
  function closeSheet(id){ document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.overlay').forEach(ov=>{
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); });
  });

  // ---- Init ----
  loadState();
  updateHeaderName();
  render();
</script>
</body>
</html>
